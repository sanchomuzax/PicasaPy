name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Egészséges futás ~5 perc; korlát nélkül egy beragadt (#53 GIL-deadlock)
    # pytest 6 órán át foglalná a runnert, és eldugítaná a teljes Actions-sort
    # (2026-07-19-en 19 beragadt futás állította le a release-automatikát).
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libpulse0: a Qt Multimedia (videó-lejátszás, #14) betöltéséhez
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libpulse0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 opencv-python-headless pillow piexif watchdog pytest pytest-cov

      - name: Run tests
        # darabolt futtatás (#53): a teljes készlet egy processzben a
        # Windows-runneren rendszeresen GIL-deadlockba ragadt — a script
        # a tests/app fájlokat külön processzben, kemény timeouttal futtatja
        run: python scripts/run_tests.py
