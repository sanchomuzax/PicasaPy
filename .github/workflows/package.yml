name: Package

# Csomagépítés + feltöltés release-asset gyanánt (#4). Külön fájl a
# release.yml mellett (azt nem módosítjuk) — a release.yml hozza létre a
# GitHub Release-t minden main-push után (ha a verzióhoz még nincs), ez a
# workflow pedig a "release published" eseményre kapcsolódva rá építi a
# letölthető csomagokat (wheel, sdist, .deb, Windows-zip).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Release tag, amihez a csomagokat fel kell tölteni (pl. v0.4.35).
          Csak kézi újrafuttatáshoz kell — a "release published" esemény
          automatikusan hozza a tag-et.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wheel + sdist build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Debian-csomag build (.deb)
        run: ./packaging/build_deb.sh

      - name: Windows-zip build
        run: ./packaging/build_windows_zip.sh

      - name: Tag meghatározása
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "HIBA: nincs release tag (sem eseményből, sem workflow_dispatch inputból)." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Release-asset feltöltés
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release upload "$TAG" \
            dist/*.whl dist/*.tar.gz \
            packaging/dist/*.deb packaging/dist/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
