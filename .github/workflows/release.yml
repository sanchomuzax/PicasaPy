name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verzió kiolvasása a pyproject.toml-ból
        id: version
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: GitHub Release létrehozása, ha a verzióhoz még nincs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "A ${TAG} release már létezik — a Releases hasáb naprakész, nincs teendő."
            exit 0
          fi
          echo "A ${TAG} release hiányzik a main mögött — pótlás..."
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "${{ github.sha }}" \
            --title "PicasaPy ${VERSION}" \
            --generate-notes
