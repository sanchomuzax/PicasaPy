document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

Fspan><\u002Fh1>\n      <p style=\"margin:28px 0 0;max-width:52ch;font-size:clamp(18px,2vw,24px);line-height:1.5;color:#cfccc5;font-weight:400\">Egy asztali fotókezelő felület dizájnrendszere — színek, tipográfia, ikonok, komponensek és nyelvezet, a képernyőmentések alapján rekonstruálva.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#8f8b83\">\n      <span>Asztali szoftver · Windows · Fotókezelés<\u002Fspan>\n      <span>Brandbook<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TARTALOM ============ -->\n  <section style=\"padding:72px 72px 40px;border-bottom:1px solid #ddd9d2\">\n    <p style=\"margin:0 0 40px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#3b8f00\">Tartalom<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2px 40px;font-size:19px\">\n      <a href=\"#s1\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">01<\u002Fspan> Alapelvek<\u002Fa>\n      <a href=\"#s2\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">02<\u002Fspan> Logó<\u002Fa>\n      <a href=\"#s3\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">03<\u002Fspan> Szín<\u002Fa>\n      <a href=\"#s4\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">04<\u002Fspan> Tipográfia<\u002Fa>\n      <a href=\"#s5\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">05<\u002Fspan> Ikonográfia<\u002Fa>\n      <a href=\"#s6\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">06<\u002Fspan> Gombok és vezérlők<\u002Fa>\n      <a href=\"#s7\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">07<\u002Fspan> Elrendezés<\u002Fa>\n      <a href=\"#s8\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">08<\u002Fspan> Komponensek<\u002Fa>\n      <a href=\"#s9\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">09<\u002Fspan> Szűrők és keresés<\u002Fa>\n      <a href=\"#s10\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">10<\u002Fspan> Arcfelismerés és emberek<\u002Fa>\n      <a href=\"#s11\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">11<\u002Fspan> Mappakezelő<\u002Fa>\n      <a href=\"#s12\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">12<\u002Fspan> Feltöltés és webalbumok<\u002Fa>\n      <a href=\"#s13\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">13<\u002Fspan> Hangnem és nyelvezet<\u002Fa>\n      <a href=\"#s14\" style=\"display:flex;gap:16px;padding:16px 0;border-top:1px solid #ddd9d2;color:#1c1b19\"><span style=\"font-family:'IBM Plex Mono',monospace;color:#a29e96\">14<\u002Fspan> Indítóképernyő<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 01 ALAPELVEK ============ -->\n  <section id=\"s1\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">01 — Alapelvek<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em;max-width:16ch\">A keret háttérbe húzódik, a fotó előrelép<\u002Fh2>\n    <p style=\"margin:28px 0 0;max-width:64ch;font-size:20px;line-height:1.6;color:#4a4843\">A rendszer célja, hogy sok ezer képet tegyen kezelhetővé egyetlen ablakban. A felület ezért visszafogott és sűrű: semleges szürke keret, apró vezérlők, és a képernyő nagy részét betöltő tartalom. A dizájn nem hívja fel magára a figyelmet — a fényképeknek dolgozik.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:0;margin-top:64px;border-top:1px solid #1c1b19\">\n      <div style=\"padding:32px 32px 40px 0;border-right:1px solid #ddd9d2\">\n        <p style=\"margin:0 0 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a29e96\">01<\u002Fp>\n        <h3 style=\"margin:0 0 10px;font-size:23px;font-weight:600;letter-spacing:-.01em\">Sűrű, de olvasható<\u002Fh3>\n        <p style=\"margin:0;font-size:16px;line-height:1.55;color:#5a5750\">Az információsűrűség érték. Kis betűk, szoros térközök, mégis világos hierarchia — semmi nem lóg ki, minden a helyén van.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:32px;border-right:1px solid #ddd9d2\">\n        <p style=\"margin:0 0 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a29e96\">02<\u002Fp>\n        <h3 style=\"margin:0 0 10px;font-size:23px;font-weight:600;letter-spacing:-.01em\">Semleges keret, színes tartalom<\u002Fh3>\n        <p style=\"margin:0;font-size:16px;line-height:1.55;color:#5a5750\">A felület palettája szándékosan szürke. A szín a képekből és egyetlen zöld cselekvő gombból érkezik, sosem a díszítésből.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:32px\">\n        <p style=\"margin:0 0 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a29e96\">03<\u002Fp>\n        <h3 style=\"margin:0 0 10px;font-size:23px;font-weight:600;letter-spacing:-.01em\">Ismerős asztali minták<\u002Fh3>\n        <p style=\"margin:0;font-size:16px;line-height:1.55;color:#5a5750\">Menüsor, mappafa, kontextusmenük, eszköztárak — a rendszer az operációs rendszer bevett nyelvét beszéli, nincs újratanulás.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:0;border-top:1px solid #ddd9d2;padding-top:32px;max-width:60ch\">\n      <p style=\"margin:0 0 14px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a29e96\">04<\u002Fp>\n      <h3 style=\"margin:0 0 10px;font-size:23px;font-weight:600;letter-spacing:-.01em\">Egyetlen kiemelt tett<\u002Fh3>\n      <p style=\"margin:0;font-size:16px;line-height:1.55;color:#5a5750\">Bármennyi vezérlő van a képernyőn, egyszerre csak egy hangsúlyos: a zöld elsődleges gomb. Minden más másodlagos, szürke.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 LOGÓ ============ -->\n  <section id=\"s2\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">02 — Logó<\u002Fp>\n    <h2 style=\"margin:0 0 48px;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">A jelölés<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:24px;align-items:stretch\">\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:56px 64px;display:flex;align-items:center;justify-content:center\">\n        <img src=\"d18792bb-579c-4083-9681-94f9d5999c0c\" alt=\"PicasaPy logó\" style=\"width:100%;max-width:460px;height:auto;display:block\">\n      <\u002Fdiv>\n      <div style=\"background:#1c1b19;color:#f5f4f1;padding:40px;display:flex;flex-direction:column;justify-content:space-between;gap:24px\">\n        <p style=\"margin:0;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#8f8b83\">A jel felépítése<\u002Fp>\n        <div style=\"width:99px;height:96px;overflow:hidden;display:block;flex-shrink:0\"><img src=\"d18792bb-579c-4083-9681-94f9d5999c0c\" alt=\"PicasaPy jel\" style=\"height:96px;width:329px;display:block\"><\u002Fdiv>\n        <p style=\"margin:0;font-size:16px;line-height:1.55;color:#cfccc5\">Egy zárszerkezet öt színes lapátja — piros, sárga, zöld, kék, lila. A színes jelet mindig a kétszínű szó­jellel párosítjuk: a <strong style=\"color:#fff\">Picasa<\u002Fstrong> grafit­szürke, a <strong style=\"color:#fff\">Py<\u002Fstrong> a márkakék + sárga.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;margin-top:24px\">\n      <div style=\"border:1px solid #ddd9d2;padding:28px;background:#fff\">\n        <p style=\"margin:0 0 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#3b8f00\">Védőtávolság<\u002Fp>\n        <p style=\"margin:0;font-size:15px;line-height:1.5;color:#5a5750\">A jel köré minden oldalon legalább egy mezőnyi (a mark egy négyzetével egyenlő) üres tér kerül.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #ddd9d2;padding:28px;background:#fff\">\n        <p style=\"margin:0 0 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#3b8f00\">Minimális méret<\u002Fp>\n        <p style=\"margin:0;font-size:15px;line-height:1.5;color:#5a5750\">Képernyőn a mark sosem kisebb 16&nbsp;px-nél; a fejlécben szó­jellel együtt jelenik meg.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid #d8b4a8;padding:28px;background:#fbf2ef\">\n        <p style=\"margin:0 0 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#c85a3a\">Kerülendő<\u002Fp>\n        <p style=\"margin:0;font-size:15px;line-height:1.5;color:#7a4437\">Ne nyújtsd, ne színezd át a markot, és ne tedd nyugtalan, mintás háttérre.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 SZÍN ============ -->\n  <section id=\"s3\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">03 — Szín<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">A paletta<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:60ch;font-size:20px;line-height:1.6;color:#4a4843\">A márkát a logó öt színe hordozza. A felület ezzel szemben egy semleges szürke skálára épül, amelyre néhány jelző szín kerül — mind funkciót jelöl, sosem díszít.<\u002Fp>\n\n    <p style=\"margin:0 0 18px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#a29e96\">Márka — a logó színei<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:2px;margin-bottom:24px;border:1px solid #ddd9d2\">\n      <div style=\"background:#fff\"><div style=\"height:150px;background:#ef3e3a\"><\u002Fdiv><div style=\"padding:16px\"><p style=\"margin:0;font-weight:600;font-size:15px\">Piros<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8f8b83\">#EF3E3A<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff\"><div style=\"height:150px;background:#f8b813\"><\u002Fdiv><div style=\"padding:16px\"><p style=\"margin:0;font-weight:600;font-size:15px\">Sárga<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8f8b83\">#F8B813<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff\"><div style=\"height:150px;background:#13a65a\"><\u002Fdiv><div style=\"padding:16px\"><p style=\"margin:0;font-weight:600;font-size:15px\">Zöld<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8f8b83\">#13A65A<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff\"><div style=\"height:150px;background:#3478db\"><\u002Fdiv><div style=\"padding:16px\"><p style=\"margin:0;font-weight:600;font-size:15px\">Kék<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8f8b83\">#3478DB<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff\"><div style=\"height:150px;background:#9348b8\"><\u002Fdiv><div style=\"padding:16px\"><p style=\"margin:0;font-weight:600;font-size:15px\">Lila<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8f8b83\">#9348B8<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:2px;margin-bottom:64px;border:1px solid #ddd9d2\">\n      <div style=\"background:#fff\"><div style=\"height:110px;background:#303743\"><\u002Fdiv><div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Szó­jel grafit<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#303743<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">A „Picasa\" felirat színe<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff\"><div style=\"height:110px;background:#2f80ed\"><\u002Fdiv><div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Py kék<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#2F80ED<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">A „P\" betű a szó­jelben<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff\"><div style=\"height:110px;background:#f4b400\"><\u002Fdiv><div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Py sárga<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#F4B400<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Az „y\" betű a szó­jelben<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin:0 0 18px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#a29e96\">Felület — semleges keret<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:2px;margin-bottom:64px;border:1px solid #ddd9d2\">\n      <div style=\"background:#fff\">\n        <div style=\"height:150px;background:#ffffff;border-bottom:1px solid #ddd9d2\"><\u002Fdiv>\n        <div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Panel fehér<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#FFFFFF<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Indexkép- és tartalompanel<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:150px;background:#f3f3f3\"><\u002Fdiv>\n        <div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Oldalsáv<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#F3F3F3<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Mappafa háttere<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:150px;background:#eaeaea\"><\u002Fdiv>\n        <div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Vászon<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#EAEAEA<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Alkalmazás háttere<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:150px;background:#e2e2e2\"><\u002Fdiv>\n        <div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Eszköztár<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#E2E2E2<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Sávok, elválasztók<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:150px;background:#cdcdcd\"><\u002Fdiv>\n        <div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px\">Görgetősáv<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#CDCDCD<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Vezérlők, keretek<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#1c1b19;color:#fff\">\n        <div style=\"height:150px;background:#1c1b19\"><\u002Fdiv>\n        <div style=\"padding:18px\"><p style=\"margin:0;font-weight:600;font-size:16px;color:#fff\">Tinta<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#1C1B19<\u002Fp><p style=\"margin:8px 0 0;font-size:13px;color:#8f8b83\">Szöveg, menüfeliratok<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin:0 0 18px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#a29e96\">Jelző színek<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:2px;border:1px solid #ddd9d2\">\n      <div style=\"background:#fff\">\n        <div style=\"height:180px;background:#3b8f00\"><\u002Fdiv>\n        <div style=\"padding:20px\"><p style=\"margin:0;font-weight:600;font-size:17px\">Fotó zöld<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#3B8F00<\u002Fp><p style=\"margin:10px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Az egyetlen elsődleges cselekvés színe — feltöltés, mentés. Oldalanként legfeljebb egyszer.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:180px;background:#83a7bd\"><\u002Fdiv>\n        <div style=\"padding:20px\"><p style=\"margin:0;font-weight:600;font-size:17px\">Jelölő kék<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#83A7BD<\u002Fp><p style=\"margin:10px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">A kijelölt mappa vagy elem kiemelése a listában. Nyugodt, telítetlen acélkék.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:180px;background:#ebcc8f\"><\u002Fdiv>\n        <div style=\"padding:20px\"><p style=\"margin:0;font-weight:600;font-size:17px\">Mappa arany<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#EBCC8F<\u002Fp><p style=\"margin:10px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">A mappaikonok meleg tónusa. A rendszer egyetlen „tárgyi\" színfoltja.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff\">\n        <div style=\"height:180px;background:#1a0dab\"><\u002Fdiv>\n        <div style=\"padding:20px\"><p style=\"margin:0;font-weight:600;font-size:17px\">Hivatkozás kék<\u002Fp><p style=\"margin:6px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">#1A0DAB<\u002Fp><p style=\"margin:10px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Kattintható szöveges linkek, például a fiókbejelentkezés a fejlécben.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:24px 0 0;max-width:64ch;font-size:15px;line-height:1.6;color:#8f8b83;font-family:'IBM Plex Mono',monospace\">Arány: kb. 90% semleges · 8% tinta · &lt;2% jelző szín. A jelző színek együtt sem uralják a képernyőt.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ 04 TIPOGRÁFIA ============ -->\n  <section id=\"s4\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">04 — Tipográfia<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Betűk<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">A felület egy humanista rendszer-groteszkkel dolgozik apró méretekben — a beépített betűkészlet olvasható marad 11–13&nbsp;px-en is. A márkakommunikációban ezt az <strong>Archivo<\u002Fstrong> (kijelző és szöveg) és az <strong>IBM&nbsp;Plex&nbsp;Mono<\u002Fstrong> (technikai címkék, adatok) párosa képviseli.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:40px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#a29e96\">Kijelző / szöveg — Archivo<\u002Fp>\n        <p style=\"margin:0;font-size:88px;line-height:.95;font-weight:800;letter-spacing:-.03em\">Aa<\u002Fp>\n        <p style=\"margin:20px 0 0;font-size:26px;line-height:1.35;font-weight:400\">A gyümölcs­tál mögött hét zöld füge nőtt.<\u002Fp>\n        <p style=\"margin:18px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">400 · 500 · 600 · 700 · 800<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#1c1b19;color:#f5f4f1;padding:40px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#8f8b83\">Adat / címke — IBM Plex Mono<\u002Fp>\n        <p style=\"margin:0;font-family:'IBM Plex Mono',monospace;font-size:88px;line-height:.95;font-weight:500\">Aa<\u002Fp>\n        <p style=\"margin:20px 0 0;font-family:'IBM Plex Mono',monospace;font-size:22px;line-height:1.4\">2026-xx-xx · 25 kép · 37,5 MB<\u002Fp>\n        <p style=\"margin:18px 0 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">400 · 500 · 600<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#fff;border:1px solid #ddd9d2\">\n      <div style=\"display:flex;align-items:baseline;gap:24px;padding:22px 32px;border-bottom:1px solid #eee9e2\"><span style=\"width:120px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#a29e96\">Kijelző<\u002Fspan><span style=\"font-size:48px;font-weight:700;letter-spacing:-.025em\">Mappák<\u002Fspan><span style=\"margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">48 / 700 / -2.5%<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:24px;padding:22px 32px;border-bottom:1px solid #eee9e2\"><span style=\"width:120px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#a29e96\">Címsor<\u002Fspan><span style=\"font-size:28px;font-weight:600;letter-spacing:-.015em\">2026-xx-xx Dombori kamera<\u002Fspan><span style=\"margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">28 / 600<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:24px;padding:22px 32px;border-bottom:1px solid #eee9e2\"><span style=\"width:120px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#a29e96\">Törzs<\u002Fspan><span style=\"font-size:18px;font-weight:400\">Leírás hozzáadása a kijelölt mappához<\u002Fspan><span style=\"margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">18 / 400<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:24px;padding:22px 32px;border-bottom:1px solid #eee9e2\"><span style=\"width:120px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#a29e96\">Felület<\u002Fspan><span style=\"font-size:13px;font-weight:400\">Menüsor, mappanevek és feliratok · 11–13 px<\u002Fspan><span style=\"margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">13 / 400<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:24px;padding:22px 32px\"><span style=\"width:120px;flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#a29e96\">Címke<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase\">Szinkronizálás az internettel<\u002Fspan><span style=\"margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8f8b83\">12 / mono / +14%<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 IKONOGRÁFIA ============ -->\n  <section id=\"s5\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">05 — Ikonográfia<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Ikonok<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">Az ikonok kicsik, funkcionálisak és 16&nbsp;px-es rácsra épülnek. A kép­tartalomhoz kötődő jelölések — csillag, ember, hely — telített, könnyen felismerhető szín­foltok az egyébként szürke felületen.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:2px;border:1px solid #ddd9d2;background:#ddd9d2\">\n      <div style=\"background:#fff;padding:32px 20px;text-align:center\"><div style=\"font-size:30px;line-height:1;color:#e0a92e\">★<\u002Fdiv><p style=\"margin:14px 0 4px;font-size:15px;font-weight:600\">Csillag<\u002Fp><p style=\"margin:0;font-size:13px;color:#8f8b83\">Kedvenc jelölés<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;padding:32px 20px;text-align:center\"><div style=\"font-size:30px;line-height:1;color:#5a5750\">☆<\u002Fdiv><p style=\"margin:14px 0 4px;font-size:15px;font-weight:600\">Üres csillag<\u002Fp><p style=\"margin:0;font-size:13px;color:#8f8b83\">Jelöletlen állapot<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;padding:32px 20px;text-align:center\"><div style=\"display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#83a7bd;color:#fff;font-size:16px;font-weight:700\">●<\u002Fdiv><p style=\"margin:14px 0 4px;font-size:15px;font-weight:600\">Ember<\u002Fp><p style=\"margin:0;font-size:13px;color:#8f8b83\">Arcfelismerés<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;padding:32px 20px;text-align:center\"><div style=\"font-size:30px;line-height:1;color:#c1362a\">⚲<\u002Fdiv><p style=\"margin:14px 0 4px;font-size:15px;font-weight:600\">Hely<\u002Fp><p style=\"margin:0;font-size:13px;color:#8f8b83\">Geocímke jelző<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;padding:32px 20px;text-align:center\"><div style=\"font-size:28px;line-height:1;color:#5a5750\">▸<\u002Fdiv><p style=\"margin:14px 0 4px;font-size:15px;font-weight:600\">Lejátszás<\u002Fp><p style=\"margin:0;font-size:13px;color:#8f8b83\">Diavetítés<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;padding:32px 20px;text-align:center\"><div style=\"font-size:26px;line-height:1;color:#5a5750\">▾<\u002Fdiv><p style=\"margin:14px 0 4px;font-size:15px;font-weight:600\">Legördülő<\u002Fp><p style=\"margin:0;font-size:13px;color:#8f8b83\">Osztott gomb<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px;margin-top:24px\">\n      <div style=\"border:1px solid #ddd9d2;padding:26px;background:#fff\"><p style=\"margin:0 0 8px;font-weight:600;font-size:16px\">Rács<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">16&nbsp;px-es alaprács, 1&nbsp;px-es vonalvastagság. Az ikonok a felület méretén osztoznak a szöveggel.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #ddd9d2;padding:26px;background:#fff\"><p style=\"margin:0 0 8px;font-weight:600;font-size:16px\">Stílus<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Tömör, kitöltött formák; kevés részlet. A jelentés fontosabb, mint a dísz.<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #ddd9d2;padding:26px;background:#fff\"><p style=\"margin:0 0 8px;font-weight:600;font-size:16px\">Szín<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Alap: szürke. Csak a tartalmi jelölések (csillag, hely, ember) kapnak telített színt.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 GOMBOK ============ -->\n  <section id=\"s6\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">06 — Gombok és vezérlők<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Vezérlők<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">Egy zöld elsődleges gomb, a többi visszafogott szürke. Az osztott gombok, kapcsolók és csúszkák mind az asztali konvenciót követik.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px\">\n\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:36px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#3b8f00\">Elsődleges<\u002Fp>\n        <button style=\"border:1px solid #2f7000;background:#3b8f00;color:#fff;font-family:'Archivo',sans-serif;font-size:16px;font-weight:600;padding:14px 26px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)\" style-hover=\"background:#347e00\">Feltöltés a Google Fotókba<\u002Fbutton>\n        <p style=\"margin:22px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Telített zöld, finom belső fény felül. Képernyőnként egy darab.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:36px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Másodlagos + osztott<\u002Fp>\n        <div style=\"display:inline-flex;align-items:stretch\">\n          <button style=\"border:1px solid #b7b7b7;border-right:none;background:linear-gradient(#fbfbfb,#e9e9e9);color:#2a2a2a;font-family:'Archivo',sans-serif;font-size:15px;font-weight:500;padding:11px 20px;cursor:pointer\" style-hover=\"background:#f0f0f0\">Feltöltés<\u002Fbutton>\n          <button style=\"border:1px solid #b7b7b7;background:linear-gradient(#fbfbfb,#e9e9e9);color:#2a2a2a;font-size:12px;padding:11px 12px;cursor:pointer\" style-hover=\"background:#f0f0f0\">▾<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"margin:22px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Szürke színátmenet, 1&nbsp;px szegély. Az osztott rész legördülőt nyit.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:36px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Ikongomb<\u002Fp>\n        <div style=\"display:inline-flex;gap:0;border:1px solid #c3c3c3;background:linear-gradient(#fafafa,#ececec)\">\n          <div style=\"padding:10px 13px;font-size:16px;color:#2f7000;border-right:1px solid #d2d2d2\">▸<\u002Fdiv>\n          <div style=\"padding:10px 13px;font-size:14px;color:#5a5750;border-right:1px solid #d2d2d2\">▦<\u002Fdiv>\n          <div style=\"padding:10px 13px;font-size:14px;color:#e0a92e;border-right:1px solid #d2d2d2\">★<\u002Fdiv>\n          <div style=\"padding:10px 13px;font-size:14px;color:#5a5750\">▤<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:22px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Eszköztár-ikonok egy sávban, vékony elválasztókkal.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:36px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Kapcsoló<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <span style=\"font-size:13px;color:#5a5750\">Szinkronizálás<\u002Fspan>\n          <div style=\"width:52px;height:24px;border-radius:12px;background:#83a7bd;position:relative;border:1px solid #6f93aa\"><div style=\"position:absolute;top:1px;right:1px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.3)\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:22px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Be-állapotban jelölő kékkel. A címke mindig a kapcsoló mellett.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ddd9d2;padding:36px\">\n        <p style=\"margin:0 0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Csillagozás<\u002Fp>\n        <div style=\"font-size:24px;letter-spacing:3px;color:#e0a92e\">★★★<span style=\"color:#cf
