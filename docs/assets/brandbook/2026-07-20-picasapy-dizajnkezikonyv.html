\u002Fp>\n    <div style=\"border:1px solid #1c1b19;background:#eaeaea;height:520px;display:flex;flex-direction:column\">\n      <div style=\"height:34px;background:#fff;border-bottom:1px solid #cdcdcd;display:flex;align-items:center;padding:0 16px;gap:22px;font-size:13px;color:#3a3a3a\"><span style=\"font-weight:600\">▦ Menüsor<\u002Fspan><span style=\"color:#9a9a9a\">Fájl · Szerkesztés · Nézet · Mappa · Kép · Eszközök<\u002Fspan><\u002Fdiv>\n      <div style=\"height:40px;background:#e2e2e2;border-bottom:1px solid #cdcdcd;display:flex;align-items:center;padding:0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#7a776f\">Eszköztár · szűrők · keresés<\u002Fdiv>\n      <div style=\"flex:1;display:flex;min-height:0\">\n        <div style=\"width:230px;background:#f3f3f3;border-right:1px solid #cdcdcd;padding:20px;position:relative\"><span style=\"position:absolute;top:16px;left:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#7a776f\">Oldalsáv<\u002Fspan><p style=\"margin:44px 0 0;font-size:14px;color:#8f8b83;line-height:1.7\">Albumok<br>Projektek<br>Mappák — évek szerint<\u002Fp><div style=\"margin-top:12px;background:#83a7bd;color:#fff;font-size:13px;padding:6px 10px\">Kijelölt mappa<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;background:#eaeaea;padding:24px;position:relative\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#7a776f\">Indexkép-terület<\u002Fspan><div style=\"margin-top:16px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px\">\n          <div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv>\n          <div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:56px;background:#e2e2e2;border-top:1px solid #cdcdcd;display:flex;align-items:center;justify-content:space-between;padding:0 16px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#7a776f\">Alsó vezérlősáv<\u002Fspan><span style=\"background:#3b8f00;color:#fff;font-size:13px;font-weight:600;padding:9px 18px\">Zöld elsődleges tett<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px;margin-top:24px\">\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Menüsor<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Minden funkció teljes elérése, klasszikus legördülőkkel.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Oldalsáv<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Navigáció: albumok, projektek, mappák időrendben.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Indexkép-terület<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">A tartalom — mappánként csoportosított, méretezhető rács.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Alsó vezérlősáv<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Gyakori műveletek és az egyetlen zöld elsődleges gomb.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 KOMPONENSEK ============ -->\n  <section id=\"s8\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">08 — Komponensek<\u002Fp>\n    <h2 style=\"margin:0 0 56px;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Építőelemek<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;align-items:start\">\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Legördülő menü<\u002Fp>\n        <div style=\"background:#f2f2f2;border:1px solid #a9a9a9;box-shadow:2px 2px 6px rgba(0,0,0,.18);font-size:14px;color:#2a2a2a\">\n          <div style=\"display:flex;justify-content:space-between;padding:8px 16px\" style-hover=\"background:#83a7bd;color:#fff\"><span>Új album…<\u002Fspan><span style=\"color:#9a9a9a\">Ctrl+N<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 16px\" style-hover=\"background:#83a7bd;color:#fff\"><span>Mappa hozzáadása…<\u002Fspan><span style=\"color:#9a9a9a\">Ctrl+O<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 16px\" style-hover=\"background:#83a7bd;color:#fff\"><span>Importálás forrása…<\u002Fspan><span style=\"color:#9a9a9a\">Ctrl+M<\u002Fspan><\u002Fdiv>\n          <div style=\"height:1px;background:#d5d5d5;margin:5px 0\"><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 16px\" style-hover=\"background:#83a7bd;color:#fff\"><span>Mentés<\u002Fspan><span style=\"color:#9a9a9a\">Ctrl+S<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 16px;color:#b3b3b3\"><span>Mentés másként…<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:16px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Világosszürke lap, 1&nbsp;px szegély, lágy vetett árnyék. A gyorsbillentyű jobbra igazítva, a kijelölés jelölő kékkel.<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Mappafa<\u002Fp>\n        <div style=\"background:#f3f3f3;border:1px solid #cdcdcd;padding:10px 0;font-size:14px;color:#2a2a2a\">\n          <div style=\"padding:5px 16px;color:#7a776f;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em\">2026<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:5px 16px\"><span style=\"color:#e0a92e\">▸<\u002Fspan> X (1)<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:5px 16px\"><span style=\"color:#e0a92e\">▸<\u002Fspan> 2026-xx-xx screen (495)<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:6px 16px;background:#83a7bd;color:#fff\"><span>▸<\u002Fspan> 2026-xx-xx Dombori kamera (25)<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:5px 16px\"><span style=\"color:#e0a92e\">▸<\u002Fspan> 2026-xx-xx (1 145)<\u002Fdiv>\n          <div style=\"padding:5px 16px;color:#7a776f;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em\">2025<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:5px 16px\"><span style=\"color:#e0a92e\">▸<\u002Fspan> 2025-12-xx (178)<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:16px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Évek szerinti csoportosítás, arany mappaikon, a darabszám zárójelben. A kijelölt sor teljes szélességben jelölő kék.<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Indexkép-csoport<\u002Fp>\n        <div style=\"background:#fff;border:1px solid #cdcdcd;padding:16px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px\"><span style=\"font-size:16px;font-weight:600\">2026-xx-xx Dombori kamera<\u002Fspan><span style=\"font-size:11px;color:#3b8f00;font-family:'IBM Plex Mono',monospace\">SZINKRON<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0 0 12px;font-size:13px;color:#a29e96;font-style:italic\">Leírás hozzáadása<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:6px\">\n            <div style=\"aspect-ratio:4/3;background:#c3bfb6\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#c9c5bc\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#bfbbb2\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#c3bfb6\"><\u002Fdiv>\n            <div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#bfbbb2\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#c9c5bc\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#c3bfb6\"><\u002Fdiv><div style=\"aspect-ratio:4/3;background:#cfcbc3\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:16px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Fejléc a mappa címével és szinkron-állapottal, alatta a szerkeszthető leírás, majd a fehér alapon úszó indexkép-rács.<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Alsó eszköztár<\u002Fp>\n        <div style=\"background:#e2e2e2;border:1px solid #cdcdcd;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n          <div style=\"display:flex;gap:8px\"><div style=\"width:32px;height:32px;background:linear-gradient(#fafafa,#ececec);border:1px solid #b7b7b7;display:flex;align-items:center;justify-content:center;color:#e0a92e\">★<\u002Fdiv><div style=\"width:32px;height:32px;background:linear-gradient(#fafafa,#ececec);border:1px solid #b7b7b7;display:flex;align-items:center;justify-content:center;color:#c1362a\">⚲<\u002Fdiv><\u002Fdiv>\n          <button style=\"border:1px solid #2f7000;background:#3b8f00;color:#fff;font-family:'Archivo',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)\">Feltöltés a Google Fotókba<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"margin:16px 0 0;font-size:14px;line-height:1.5;color:#5a5750\">Szürke sáv a segéd-ikonokkal, jobbra igazítva az egyetlen zöld elsődleges gomb — a képernyő vizuális súlypontja.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 SZŰRŐK ============ -->\n  <section id=\"s9\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">09 — Szűrők és keresés<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">A szűrősáv<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">A tartalompanel fölötti keskeny sáv szűkíti a látható képeket. Ikonos kapcsolók (csillag, arc, geocímke, mozgókép, méret) egy csúszkával, jobbra pedig a kereső. A bekapcsolt szűrő tónusa jelölő kék.<\u002Fp>\n\n    <div style=\"background:#e2e2e2;border:1px solid #cdcdcd;padding:10px 14px;display:flex;align-items:center;gap:18px;flex-wrap:wrap\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7a776f\">Szűrők<\u002Fspan>\n      <div style=\"display:flex;gap:2px\">\n        <div style=\"width:34px;height:28px;background:#83a7bd;border:1px solid #6f93aa;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px\">★<\u002Fdiv>\n        <div style=\"width:34px;height:28px;background:linear-gradient(#fafafa,#ececec);border:1px solid #b7b7b7;display:flex;align-items:center;justify-content:center;color:#5a5750;font-size:14px\">☺<\u002Fdiv>\n        <div style=\"width:34px;height:28px;background:linear-gradient(#fafafa,#ececec);border:1px solid #b7b7b7;display:flex;align-items:center;justify-content:center;color:#c1362a;font-size:13px\">⚲<\u002Fdiv>\n        <div style=\"width:34px;height:28px;background:linear-gradient(#fafafa,#ececec);border:1px solid #b7b7b7;display:flex;align-items:center;justify-content:center;color:#5a5750;font-size:13px\">▤<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;min-width:130px\"><div style=\"flex:1;height:4px;border-radius:2px;background:#cdcdcd;position:relative\"><div style=\"position:absolute;left:30%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:linear-gradient(#fff,#e6e6e6);border:1px solid #a8a8a8\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1;min-width:180px;height:28px;background:#fff;border:1px solid #b7b7b7;display:flex;align-items:center;padding:0 10px;gap:8px;color:#a29e96;font-size:13px\"><span>⌕<\u002Fspan> Keresés<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:24px;margin-top:32px\">\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">★ Csillag<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Csak a csillagozott kedvencek mutatása.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">☺ Arcok<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Csak arcot tartalmazó képek szűrése.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">⚲ Geocímke<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Csak helyadattal ellátott képek.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">▤ Mozgókép / méret<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Videók, illetve a minimális kép­méret csúszkával.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 ARCFELISMERÉS ============ -->\n  <section id=\"s10\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">10 — Arcfelismerés és emberek<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Emberek<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">A rendszer arcokat ismer fel a képeken, és névhez rendeli őket. A kis „Emberek\" panel a képen talált arcokat sorolja fel; a névtelen arcokhoz beviteli mező tartozik, minden arc mellett elvetés (×) gombbal.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start\">\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Emberek panel<\u002Fp>\n        <div style=\"background:#4a4a4a;border-radius:10px;padding:14px;color:#f0f0f0;max-width:340px;box-shadow:0 6px 20px rgba(0,0,0,.2)\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\"><span style=\"font-size:15px;font-weight:600\">Emberek<\u002Fspan><span style=\"width:18px;height:18px;border-radius:50%;background:#5f5f5f;display:flex;align-items:center;justify-content:center;font-size:11px\">×<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0 0 10px;font-size:12px;color:#c4c4c4\">A képen szereplő emberek:<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:12px;background:#565656;border-radius:6px;padding:8px;margin-bottom:8px\">\n            <div style=\"width:44px;height:44px;border-radius:4px;background:#8a7f74;flex-shrink:0\"><\u002Fdiv>\n            <div style=\"flex:1\"><p style=\"margin:0;font-size:14px;font-weight:600\">Falco<\u002Fp><p style=\"margin:2px 0 0;font-size:12px;color:#bdbdbd\">3 fénykép<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:6px 8px\">\n            <div style=\"position:relative;flex-shrink:0\"><div style=\"width:44px;height:44px;border-radius:4px;background:#7c8a6f\"><\u002Fdiv><span style=\"position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#fff;color:#333;font-size:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.4)\">×<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;height:26px;background:#fff;border-radius:3px;display:flex;align-items:center;padding:0 10px;color:#9a9a9a;font-size:13px\">Név hozzáadása<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Beolvasás — mappánként<\u002Fp>\n        <div style=\"background:#f2f2f2;border:1px solid #cdcdcd;border-radius:6px;padding:16px;max-width:340px\">\n          <p style=\"margin:0 0 12px;font-size:13px;color:#5a5750\">Az aktuális mappához:<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:10px;padding:7px 4px\"><span style=\"width:14px;height:14px;border-radius:50%;border:1px solid #9a9a9a;background:#fff;flex-shrink:0\"><\u002Fspan><span style=\"color:#1c9a4a;font-size:15px\">✔<\u002Fspan><span style=\"font-size:14px;color:#2a2a2a\">Egyszeri beolvasás<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;padding:7px 4px\"><span style=\"width:14px;height:14px;border-radius:50%;border:1px solid #9a9a9a;background:#fff;flex-shrink:0\"><\u002Fspan><span style=\"color:#c1362a;font-size:15px\">✖<\u002Fspan><span style=\"font-size:14px;color:#2a2a2a\">Eltávolítás a Picasából<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;padding:7px 4px\"><span style=\"width:14px;height:14px;border-radius:50%;border:4px solid #4a4a4a;background:#fff;flex-shrink:0\"><\u002Fspan><span style=\"color:#2f6fb0;font-size:15px\">↻<\u002Fspan><span style=\"font-size:14px;color:#2a2a2a;font-weight:600\">Folyamatos beolvasás<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;padding:10px 4px 2px;margin-top:6px;border-top:1px solid #dcdcdc\"><span style=\"color:#3f7f3f;font-size:16px\">◉<\u002Fspan><span style=\"font-size:14px;color:#2a2a2a\">Arcfelismerés bekapcsolva<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <p style=\"margin:32px 0 0;max-width:64ch;font-size:15px;line-height:1.6;color:#8f8b83;font-family:'IBM Plex Mono',monospace\">Állapotjelölés: zöld pipa = egyszeri, piros × = kizárás, kék körkörös nyíl = folyamatos. A választott állapot kitöltött rádiógombbal.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ 11 MAPPAKEZELŐ ============ -->\n  <section id=\"s11\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">11 — Mappakezelő<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Mit figyeljen a Picasa<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">A Mappakezelő dönti el, mely mappákban keressen a program képeket. Bal oldalt a meghajtók és mappák fája állapotjelző ikonokkal, jobbra az aktuális mappa beolvasási módja, alul a figyelt mappák listája.<\u002Fp>\n    <div style=\"border:1px solid #9aa6b4;border-radius:6px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.14);max-width:720px\">\n      <div style=\"background:linear-gradient(#dbe6f2,#c6d6e8);border-bottom:1px solid #9aa6b4;padding:8px 12px;display:flex;justify-content:space-between;align-items:center\"><span style=\"font-size:13px;color:#2a3a4a;font-weight:600\">Mappakezelő<\u002Fspan><span style=\"font-size:13px;color:#6a7a8a\">✕<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;background:#f3f3f3\">\n        <div style=\"border-right:1px solid #d5d5d5;padding:12px 0\">\n          <p style=\"margin:0 0 8px;padding:0 14px;font-size:12px;font-weight:600;color:#5a5750\">Mappalista<\u002Fp>\n          <div style=\"display:flex;gap:8px;padding:4px 14px;font-size:13px\"><span style=\"color:#2f6fb0\">↻<\u002Fspan><span style=\"color:#c9a24a\">▸<\u002Fspan> Asztal<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:5px 14px;font-size:13px;background:#83a7bd;color:#fff\"><span>↻<\u002Fspan><span>▸<\u002Fspan> Saját képek<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:4px 14px;font-size:13px\"><span style=\"color:#2f6fb0\">↻<\u002Fspan><span style=\"color:#c9a24a\">▸<\u002Fspan> Dokumentumok<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:4px 14px;font-size:13px\"><span style=\"color:#c1362a\">✖<\u002Fspan> C:\\<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:4px 14px;font-size:13px\"><span style=\"color:#c1362a\">✖<\u002Fspan> D:\\<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;padding:4px 14px;font-size:13px\"><span style=\"color:#c1362a\">✖<\u002Fspan> E:\\<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:14px\">\n          <p style=\"margin:0 0 12px;font-size:13px;line-height:1.5;color:#5a5750\">Minden mappához eldöntheted, hogy a Picasa keressen-e benne képeket, és figyelje-e az újakat.<\u002Fp>\n          <div style=\"background:#eaeaea;border:1px solid #d0d0d0;border-radius:5px;padding:12px\">\n            <p style=\"margin:0 0 8px;font-size:12px;color:#5a5750\">Az aktuális mappához:<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px\"><span style=\"width:12px;height:12px;border-radius:50%;border:1px solid #9a9a9a;flex-shrink:0\"><\u002Fspan><span style=\"color:#1c9a4a\">✔<\u002Fspan> Egyszeri beolvasás<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px\"><span style=\"width:12px;height:12px;border-radius:50%;border:1px solid #9a9a9a;flex-shrink:0\"><\u002Fspan><span style=\"color:#c1362a\">✖<\u002Fspan> Eltávolítás a Picasából<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px\"><span style=\"width:12px;height:12px;border-radius:50%;border:3px solid #4a4a4a;flex-shrink:0\"><\u002Fspan><span style=\"color:#2f6fb0\">↻<\u002Fspan> Folyamatos beolvasás<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#eaeaea;border-top:1px solid #d5d5d5;padding:10px 14px;display:flex;justify-content:flex-end;gap:8px\"><button style=\"border:1px solid #b7b7b7;background:linear-gradient(#fbfbfb,#e9e9e9);font-size:12px;padding:6px 18px;cursor:pointer\">OK<\u002Fbutton><button style=\"border:1px solid #b7b7b7;background:linear-gradient(#fbfbfb,#e9e9e9);font-size:12px;padding:6px 14px;cursor:pointer\">Mégse<\u002Fbutton><button style=\"border:1px solid #b7b7b7;background:linear-gradient(#fbfbfb,#e9e9e9);font-size:12px;padding:6px 14px;cursor:pointer\">Súgó<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 FELTÖLTÉS / WEBALBUMOK ============ -->\n  <section id=\"s12\" style=\"padding:110px 72px;border-bottom:1px solid #ddd9d2;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">12 — Feltöltés és webalbumok<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">A felhő oldala<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">A képek a felhőbe kerülnek: az automatikus mentés párbeszédablak indítja a szinkront, a feltöltött képek pedig a webalbumokban, gyűjteményekbe rendezve jelennek meg.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start\">\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Automatikus mentés<\u002Fp>\n        <div style=\"border:1px solid #9aa6b4;border-radius:4px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.14);background:#eef0f0\">\n          <div style=\"background:linear-gradient(#dbe6f2,#c6d6e8);border-bottom:1px solid #9aa6b4;padding:7px 12px;font-size:12px;color:#2a3a4a\">Automatikus mentés<\u002Fdiv>\n          <div style=\"padding:28px 24px;text-align:center\">\n            <div style=\"margin:0 auto 14px\"><div style=\"width:66px;height:64px;overflow:hidden;display:block;flex-shrink:0;margin:0 auto\"><img src=\"d18792bb-579c-4083-9681-94f9d5999c0c\" alt=\"PicasaPy jel\" style=\"height:64px;width:219px;display:block\"><\u002Fdiv><\u002Fdiv>\n            <p style=\"margin:0 0 22px;font-size:22px;font-weight:500;color:#3a3a3a\">Automatikus mentés<\u002Fp>\n            <div style=\"text-align:left;display:flex;flex-direction:column;gap:14px;margin-bottom:24px\">\n              <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:#8a8a8a;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">▣<\u002Fspan><span style=\"font-size:13px;color:#4a4a4a;line-height:1.4\">Fotók és videók biztonsági mentése a felhőbe<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:#8a8a8a;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">✦<\u002Fspan><span style=\"font-size:13px;color:#4a4a4a;line-height:1.4\">Automatikusan még jobbá válnak<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"width:26px;height:26px;background:#8a8a8a;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">↗<\u002Fspan><span style=\"font-size:13px;color:#4a4a4a;line-height:1.4\">Egyszerű megtekintés és megosztás bármely eszközről<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <button style=\"border:1px solid #a8b4c2;background:linear-gradient(#fbfbfb,#eaeaea);font-size:13px;padding:8px 28px;cursor:pointer;border-radius:2px\">Bejelentkezés<\u002Fbutton>\n            <p style=\"margin:18px 0 0;font-size:12px\"><a href=\"#s12\">Adatvédelem<\u002Fa> · <a href=\"#s12\">Feltételek<\u002Fa> &nbsp;&nbsp; <a href=\"#s12\">Fiók létrehozása<\u002Fa><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p style=\"margin:0 0 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#a29e96\">Webalbumok<\u002Fp>\n        <div style=\"background:#fff;border:1px solid #cdcdcd;border-radius:4px;overflow:hidden\">\n          <div style=\"display:flex;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid #e4e4e4\">\n            <img src=\"d18792bb-579c-4083-9681-94f9d5999c0c\" alt=\"PicasaPy\" style=\"height:20px;width:auto\">\n            <span style=\"font-size:12px;color:#9a9a9a\">Webalbumok<\u002Fspan>\n            <div style=\"margin-left:auto;display:flex;gap:16px;font-size:13px;color:#4a4a4a\"><span>Kezdőlap<\u002Fspan><span style=\"color:#3478db;font-weight:600\">Saját fotók<\u002Fspan><span>Felfedezés<\u002Fspan><span style=\"border:1px solid #c8c8c8;border-radius:3px;padding:2px 10px;background:#f4f4f4\">↥ Feltöltés<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:16px\"><span style=\"font-size:15px;font-weight:600;color:#3a3a3a\">Albumok (7)<\u002Fspan><a href=\"#s12\" style=\"font-size:12px\">Láthatóság szerkesztése<\u002Fa><span style=\"margin-left:auto;font-size:12px;color:#9a9a9a\">Rendezés: Album címe ▾<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n              <div><div style=\"aspect-ratio:1;background:#c9b48f;border-radius:2px\"><\u002Fdiv><p style=\"margin:8px 0 0;font-size:13px;font-weight:600;color:#3a3a3a\">Alkalmazások<\u002Fp><p style=\"margin:2px 0 0;font-size:11px;color:#9a9a9a\">2 kép<\u002Fp><\u002Fdiv>\n              <div><div style=\"aspect-ratio:1;background:#7f8a9a;border-radius:2px\"><\u002Fdiv><p style=\"margin:8px 0 0;font-size:13px;font-weight:600;color:#3a3a3a\">Blogger<\u002Fp><p style=\"margin:2px 0 0;font-size:11px;color:#9a9a9a\">1 kép<\u002Fp><\u002Fdiv>\n              <div><div style=\"aspect-ratio:1;background:#5a6b7a;border-radius:2px\"><\u002Fdiv><p style=\"margin:8px 0 0;font-size:13px;font-weight:600;color:#3a3a3a\">Chrome<\u002Fp><p style=\"margin:2px 0 0;font-size:11px;color:#9a9a9a\">1 kép<\u002Fp><\u002Fdiv>\n              <div><div style=\"aspect-ratio:1;background:#9a5a4a;border-radius:2px\"><\u002Fdiv><p style=\"margin:8px 0 0;font-size:13px;font-weight:600;color:#3a3a3a\">Dokumentumok<\u002Fp><p style=\"margin:2px 0 0;font-size:11px;color:#9a9a9a\">1 kép<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:20px 0 0;font-size:15px;line-height:1.6;color:#5a5750\">A webes felület világosabb és tágasabb, mint az asztali: fehér alap, négyzetes albumborítók rács, könnyű navigáció (Kezdőlap · Saját fotók · Felfedezés). A márka itt is a színes logóval jelenik meg.<\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 13 NYELVEZET ============ -->\n  <section id=\"s13\" style=\"padding:110px 72px 130px\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">13 — Hangnem és nyelvezet<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">Szavak<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:62ch;font-size:20px;line-height:1.6;color:#4a4843\">A felület magyar nyelvű, tárgyilagos és cselekvésre irányuló. A feliratok rövid főnévi vagy felszólító alakok, felkiáltás és zsargon nélkül. A szakkifejezések következetesek az egész alkalmazásban.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #ddd9d2\">\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Importálás<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">Képek behozatala eszközről vagy mappából a könyvtárba.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Feltöltés<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">Képek küldése a felhőbe (Google Fotók) — az elsődleges, zöld tett.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Indexképek<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">A rács kicsinyített előnézetei; méretük a csúszkával állítható.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Mappa · Album<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">Mappa = lemezen lévő valódi könyvtár; album = virtuális gyűjtemény.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Szinkronizálás<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">A mappa tartalmának összhangban tartása az internetes tárral.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Diavetítés<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">A kijelölt mappa képeinek teljes képernyős, automatikus lejátszása.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:16px\">Csillagozás<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">Kedvenc képek megjelölése aranycsillaggal a gyors szűréshez.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;padding:20px 32px\"><span style=\"font-weight:600;font-size:16px\">Geocímke<\u002Fspan><span style=\"font-size:15px;color:#5a5750\">Földrajzi hely rendelése a képhez; a rácsban piros hely­jelző mutatja.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px\">\n      <div style=\"border:1px solid #bcd3a8;background:#f0f6ea;padding:28px\"><p style=\"margin:0 0 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#3b8f00\">Így<\u002Fp><p style=\"margin:0;font-size:16px;line-height:1.5;color:#3a4a30\">Rövid, cselekvő címkék: „Feltöltés\", „Mappa hozzáadása\", „Indexképek frissítése\".<\u002Fp><\u002Fdiv>\n      <div style=\"border:1px solid #d8b4a8;background:#fbf2ef;padding:28px\"><p style=\"margin:0 0 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#c85a3a\">Nem így<\u002Fp><p style=\"margin:0;font-size:16px;line-height:1.5;color:#7a4437\">Bőbeszédű vagy lelkendező szöveg: „Töltsd fel most az összes fotódat!\" — kerülendő.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 14 INDÍTÓKÉPERNYŐ ============ -->\n  <section id=\"s14\" style=\"padding:110px 72px 130px;background:#efeee9\">\n    <p style=\"margin:0 0 20px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#3b8f00\">14 — Indítóképernyő<\u002Fp>\n    <h2 style=\"margin:0;font-weight:700;font-size:clamp(38px,5vw,66px);line-height:1;letter-spacing:-.025em\">PicasaPy betöltés<\u002Fh2>\n    <p style=\"margin:28px 0 56px;max-width:64ch;font-size:20px;line-height:1.6;color:#4a4843\">Amíg az alkalmazás elindul, egy tömör indítóképernyő jelenik meg: a logó, egy soronként frissülő állapotüzenet arról, min dolgozik a betöltő, és alul egy „foglalt\" jelző. Az nem valódi folyamatjelző — egy shimmer-fénycsík vonul végig a sávon, jelezve, hogy a háttérben munka folyik.<\u002Fp>\n\n    <!-- LIVE MOCKUP -->\n    <div style=\"max-width:560px;margin:0 auto;border:1px solid #3f6d8c;border-radius:8px;overflow:hidden;box-shadow:0 24px 60px rgba(28,40,52,.28);background:#fff;font-family:'Archivo',sans-serif\">\n      <!-- title bar -->\n      <div style=\"background:linear-gradient(#dbe6f2,#c6d6e8);border-bottom:1px solid #9aa6b4;padding:7px 12px;display:flex;justify-content:space-between;align-items:center\">\n        <span style=\"font-size:12px;color:#2a3a4a;font-weight:600\">PicasaPy<\u002Fspan>\n        <span style=\"font-size:12px;color:#6a7a8a\">✕<\u002Fspan>\n      <\u002Fdiv>\n      <!-- body -->\n      <div style=\"padding:52px 48px 40px;text-align:center;background:radial-gradient(120% 120% at 50% 0%,#ffffff 0%,#f2f5f7 100%)\">\n        <img src=\"d18792bb-579c-4083-9681-94f9d5999c0c\" alt=\"PicasaPy\" style=\"width:100%;max-width:300px;height:auto;display:block;margin:0 auto 14px\">\n        <p style=\"margin:0;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#9aa6b4\">PicasaPy · verzió 3.0<\u002Fp>\n        <p style=\"margin:34px 0 0;font-size:15px;color:#4b5d5f;display:flex;align-items:center;justify-content:center;gap:2px\">\n          Indexképek beolvasása<span style=\"animation:picasapy-dots 1.4s infinite\">.<\u002Fspan><span style=\"animation:picasapy-dots 1.4s infinite .2s\">.<\u002Fspan><span style=\"animation:picasapy-dots 1.4s infinite .4s\">.<\u002Fspan>\n        <\u002Fp>\n      <\u002Fdiv>\n      <!-- busy indicator / status bar -->\n      <div style=\"height:14px;background:#568fb7;position:relative;overflow:hidden\">\n        <div style=\"position:absolute;top:0;left:0;height:100%;width:34%;background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.6) 50%,rgba(255,255,255,0) 100%);animation:picasapy-shimmer 1.8s linear infinite\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin:44px 0 18px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#a29e96\">Anatómia<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:24px\">\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Logó<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">A színes mark és a szó­jel középre zárva, a verziószámmal a márka azonosítására.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Állapotüzenet<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Egy sor arról, min dolgozik a betöltő (pl. „Indexképek beolvasása…\"), animált pontokkal.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Foglalt-sáv<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">Steel-blue (#568FB7) alap, félig áttetsző fehér fénycsík balról jobbra, 1,8&nbsp;mp-es körökben.<\u002Fp><\u002Fdiv>\n      <div style=\"border-top:2px solid #1c1b19;padding-top:16px\"><p style=\"margin:0 0 6px;font-weight:600;font-size:16px\">Nem progress-bar<\u002Fp><p style=\"margin:0;font-size:14px;line-height:1.5;color:#5a5750\">A csík nem százalékot mutat — csak jelzi, hogy a háttérben folyamatos munka zajlik.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p style=\"margin:44px 0 18px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#a29e96\">Specifikáció<\u002Fp>\n    <div style=\"background:#fff;border:1px solid #ddd9d2\">\n      <div style=\"display:grid;grid-template-columns:220px 1fr;gap:24px;padding:18px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:15px\">Sáv háttere<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#5a5750\">#568FB7 (steel-blue)<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:220px 1fr;gap:24px;padding:18px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:15px\">Fénycsík<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#5a5750\">#59FFFFFF · lágy szélek felé kifutó gradiens<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:220px 1fr;gap:24px;padding:18px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:15px\">Mozgás<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#5a5750\">balról jobbra, folyamatos ismétlés<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:220px 1fr;gap:24px;padding:18px 32px;border-bottom:1px solid #eee9e2\"><span style=\"font-weight:600;font-size:15px\">Ciklusidő<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#5a5750\">1,8 s · lineáris · végtelen<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:220px 1fr;gap:24px;padding:18px 32px\"><span style=\"font-weight:600;font-size:15px\">Sáv magassága<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#5a5750\">12–14 px, az ablak teljes szélességében<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:80px;border-top:1px solid #1c1b19;padding-top:28px;display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#8f8b83\">\n      <span>Picasa 3 — Vizuális dizájnkézikönyv<\u002Fspan>\n      <span>A képernyőmentések alapján rekonstruálva · 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
